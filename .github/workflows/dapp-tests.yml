# GitHub Action for running Vitest tests
name: Dapp Tests

on:
  pull_request:
    branches: [main, staging] # Add more comma separated branches here
  push:
    branches: [main, staging] # Runs on direct pushes to main and staging

jobs:
  test:
    # Runner: change to 'macos-latest' or 'windows-latest' if needed
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./dapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Align CI with repo Node runtime

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Pick preferred pnpm version

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test # Run our Vitest tests
        # Environment variables from GitHub Secrets
        # Configure secrets at: Settings -> Secrets and variables -> Actions -> Repository Secrets -> New repository Secret
        env:
          NEXT_PUBLIC_SUI_NETWORK: ${{ secrets.NEXT_PUBLIC_SUI_NETWORK }}
          NEXT_PUBLIC_SUI_FULLNODE_URL: ${{ secrets.NEXT_PUBLIC_SUI_FULLNODE_URL }}
          # Add more secrets as needed:
          # NEW_SECRET: ${{ secrets.NEW_SECRET }}
