name: Sync server secrets to Cloudflare Pages

# Pushes server-only env vars from GitHub Actions secrets into the
# Cloudflare Pages project's secret store via wrangler. Run manually
# whenever a secret changes — once is enough; every cf-deploy afterwards
# reads them from the Pages env at request time.
#
# IMPORTANT — wrangler v4 limitation: `wrangler pages secret put` only
# targets the project's "production" environment. The `--environment`
# flag was removed in v4. To populate the "preview" env (where branch
# deploys other than the project's production branch land — including
# our `--branch=staging` deploys), one of:
#   1. Set them once in the CF dashboard (Project → Settings → Variables
#      and Secrets → Preview).
#   2. Switch the project's "production branch" to `staging` in the CF
#      dashboard so staging deploys read from production env (where this
#      workflow does push). Recommended while main is dormant.
#   3. Use the CF API directly via curl (more code; not worth it until
#      we have a real production track running).
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID — same token used for
#     cf-deploy.yml; needs the "Pages: Edit" scope which includes secrets.
#   MEMWAL_PRIVATE_KEY, MEMWAL_ACCOUNT_ID, MEMWAL_SERVER_URL,
#   OPENROUTER_API_KEY, OPENROUTER_MODEL, DEMO_ADMIN_SECRET_KEY,
#   ENOKI_PRIVATE_KEY — payload to push into the CF Pages project env
#     (testnet today; mainnet versions land here when the user provides
#     them). ENOKI_PRIVATE_KEY backs /api/sponsor + /api/sponsor/execute;
#     without it the anonymous "Submit without wallet" flow 500s with
#     "ENOKI_PRIVATE_KEY not configured on the server."

on:
  workflow_dispatch:
  # Auto-run when the env-bearing workflow file itself is committed,
  # so the "secrets are pushed" step doesn't need to be remembered.
  push:
    branches: [staging, main]
    paths:
      - ".github/workflows/cf-secrets-sync.yml"

concurrency:
  group: cf-secrets-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push server secrets to CF Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEMWAL_PRIVATE_KEY: ${{ secrets.MEMWAL_PRIVATE_KEY }}
          MEMWAL_ACCOUNT_ID: ${{ secrets.MEMWAL_ACCOUNT_ID }}
          MEMWAL_SERVER_URL: ${{ secrets.MEMWAL_SERVER_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          DEMO_ADMIN_SECRET_KEY: ${{ secrets.DEMO_ADMIN_SECRET_KEY }}
          ENOKI_PRIVATE_KEY: ${{ secrets.ENOKI_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Pass 1: wrangler CLI for the production env (one-shot per key,
          # easier to read in logs).
          echo "=== production env (wrangler pages secret put) ==="
          for KEY in MEMWAL_PRIVATE_KEY MEMWAL_ACCOUNT_ID MEMWAL_SERVER_URL OPENROUTER_API_KEY OPENROUTER_MODEL DEMO_ADMIN_SECRET_KEY ENOKI_PRIVATE_KEY; do
            VAL="${!KEY:-}"
            if [ -z "$VAL" ]; then
              echo "  [skip] $KEY is empty"
              continue
            fi
            echo "  [push] $KEY"
            printf '%s' "$VAL" | wrangler pages secret put "$KEY" \
              --project-name=echo \
              2>&1 | sed "s|^|    |"
          done

          # Pass 2: CF API for the preview env. wrangler v4 dropped
          # --environment for `pages secret put` so we PATCH the
          # project's deployment_configs directly. preview env is what
          # `--branch=staging` deploys read at request time.
          echo ""
          echo "=== preview env (CF API PATCH deployment_configs) ==="
          # Build the env_vars JSON map. jq is preinstalled on
          # ubuntu-latest. Each value goes in as a "secret_text" var.
          ENV_VARS_JSON=$(jq -n \
            --arg memk "$MEMWAL_PRIVATE_KEY" \
            --arg memid "$MEMWAL_ACCOUNT_ID" \
            --arg memurl "$MEMWAL_SERVER_URL" \
            --arg ork "$OPENROUTER_API_KEY" \
            --arg orm "$OPENROUTER_MODEL" \
            --arg demok "$DEMO_ADMIN_SECRET_KEY" \
            --arg enokik "$ENOKI_PRIVATE_KEY" '{
              MEMWAL_PRIVATE_KEY:    {type: "secret_text", value: $memk},
              MEMWAL_ACCOUNT_ID:     {type: "secret_text", value: $memid},
              MEMWAL_SERVER_URL:     {type: "secret_text", value: $memurl},
              OPENROUTER_API_KEY:    {type: "secret_text", value: $ork},
              OPENROUTER_MODEL:      {type: "plain_text",  value: $orm},
              DEMO_ADMIN_SECRET_KEY: {type: "secret_text", value: $demok},
              ENOKI_PRIVATE_KEY:     {type: "secret_text", value: $enokik}
            }')
          PAYLOAD=$(jq -n --argjson vars "$ENV_VARS_JSON" '{
            deployment_configs: { preview: { env_vars: $vars } }
          }')
          HTTP=$(curl -sw "\n%{http_code}" -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/echo" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          BODY=$(echo "$HTTP" | head -n -1)
          CODE=$(echo "$HTTP" | tail -n 1)
          if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
            echo "  ✓ preview env updated (HTTP $CODE)"
            echo "$BODY" | jq -r '.result.deployment_configs.preview.env_vars | keys[] | "    [push] " + .' 2>/dev/null || true
          else
            echo "  ✗ preview env update failed (HTTP $CODE)"
            echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
            exit 1
          fi
