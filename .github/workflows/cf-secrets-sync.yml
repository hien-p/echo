name: Sync server secrets to Cloudflare Pages

# Pushes server-only env vars from GitHub Actions secrets into the
# Cloudflare Pages project's secret store via wrangler. Run manually
# whenever a secret changes — once is enough; every cf-deploy afterwards
# reads them from the Pages env at request time.
#
# CF Pages has two secret namespaces per project:
#   production — applied when --branch=<project's production branch>
#                deploys (mainnet build via main).
#   preview    — applied to every other branch deploy (staging build).
#
# We push to BOTH so that staging (preview) and production (main) both
# have working API routes.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID — same token used for
#     cf-deploy.yml; needs the "Pages: Edit" scope which includes secrets.
#   MEMWAL_PRIVATE_KEY, MEMWAL_ACCOUNT_ID, MEMWAL_SERVER_URL,
#   OPENROUTER_API_KEY, OPENROUTER_MODEL, DEMO_ADMIN_SECRET_KEY — payload
#     to push into the CF Pages project env (testnet today; mainnet
#     versions land here when the user provides them).

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which CF Pages env to push to"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - production
          - preview

concurrency:
  group: cf-secrets-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push server secrets to CF Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MEMWAL_PRIVATE_KEY: ${{ secrets.MEMWAL_PRIVATE_KEY }}
          MEMWAL_ACCOUNT_ID: ${{ secrets.MEMWAL_ACCOUNT_ID }}
          MEMWAL_SERVER_URL: ${{ secrets.MEMWAL_SERVER_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          DEMO_ADMIN_SECRET_KEY: ${{ secrets.DEMO_ADMIN_SECRET_KEY }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          ENVS=()
          case "${TARGET:-both}" in
            production) ENVS=("production") ;;
            preview)    ENVS=("preview") ;;
            both|*)     ENVS=("production" "preview") ;;
          esac

          for ENVIRONMENT in "${ENVS[@]}"; do
            echo ""
            echo "=== pushing to CF Pages env: $ENVIRONMENT ==="
            for KEY in MEMWAL_PRIVATE_KEY MEMWAL_ACCOUNT_ID MEMWAL_SERVER_URL OPENROUTER_API_KEY OPENROUTER_MODEL DEMO_ADMIN_SECRET_KEY; do
              VAL="${!KEY:-}"
              if [ -z "$VAL" ]; then
                echo "  [skip] $KEY is empty"
                continue
              fi
              echo "  [push] $KEY"
              printf '%s' "$VAL" | wrangler pages secret put "$KEY" \
                --project-name=echo \
                --environment="$ENVIRONMENT" \
                2>&1 | sed "s|^|    |"
            done
          done
